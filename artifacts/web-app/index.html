<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrevista AMPM</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; }
        button { background-color: #d32f2f; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%;}
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-style: italic; color: #555; font-size: 14px;}

        /* Spinner + loader */
        #loader { display: none; margin-top: 24px; }
        #loader.visible { display: block; }

        #loader-text {
            font-size: 14px;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .progress-bar-track {
            background-color: #f0f0f0;
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 40%;
            background-color: #d32f2f;
            border-radius: 99px;
            animation: slide 1.4s ease-in-out infinite;
        }

        @keyframes slide {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #f0f0f0;
            border-top-color: #d32f2f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px auto 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AMPM Nicaragua</h2>
    <h3>Entrevista Virtual IA</h3>
    <p>Presiona el botón para comenzar a hablar con tu entrevistador.</p>

    <button id="recordBtn">🎤 Iniciar Entrevista</button>
    <p id="status">Esperando...</p>

    <div id="loader">
        <p id="loader-text">La reclutadora está procesando tu respuesta...</p>
        <div class="progress-bar-track">
            <div class="progress-bar-fill"></div>
        </div>
        <div class="spinner"></div>
    </div>
</div>

<script>
    const N8N_WEBHOOK_URL = "https://genaroroustan1.app.n8n.cloud/webhook/entrevista-ampm";

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let entrevistaIniciada = false;
    let historial = [];

    const recordBtn = document.getElementById("recordBtn");
    const statusText = document.getElementById("status");
    const loader = document.getElementById("loader");

    function mostrarLoader(texto) {
        document.getElementById("loader-text").innerText = texto || "La reclutadora está procesando tu respuesta...";
        loader.classList.add("visible");
    }

    function ocultarLoader() {
        loader.classList.remove("visible");
    }

    recordBtn.addEventListener("click", async () => {
        if (!entrevistaIniciada) {
            recordBtn.disabled = true;
            recordBtn.innerText = "⏳ Conectando...";
            statusText.innerText = "Iniciando entrevista, por favor espera...";
            mostrarLoader("Conectando con la reclutadora...");
            await iniciarEntrevista();
            return;
        }

        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: 16000,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true
                }
            });

            const mimeType = MediaRecorder.isTypeSupported('audio/ogg; codecs=opus')
                ? 'audio/ogg; codecs=opus'
                : MediaRecorder.isTypeSupported('audio/webm; codecs=opus')
                    ? 'audio/webm; codecs=opus'
                    : 'audio/webm';

            mediaRecorder = new MediaRecorder(stream, {
                mimeType,
                audioBitsPerSecond: 16000
            });

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: mimeType });
                audioChunks = [];
                enviarAN8n(audioBlob);
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.innerText = "⏹️ Detener y Enviar";
            statusText.innerText = "Grabando... (Habla ahora y presiona detener cuando termines)";
        } else {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.innerText = "⏳ Pensando...";
            recordBtn.disabled = true;
            statusText.innerText = "";
            mostrarLoader();
        }
    });

    async function iniciarEntrevista() {
        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ event: "start" })
            });
            const blob = await response.blob();
            reproducirAudio(blob, () => {
                entrevistaIniciada = true;
                recordBtn.innerText = "🎤 Hablar";
                recordBtn.disabled = false;
                statusText.innerText = "Tu turno de responder.";
            });
        } catch (error) {
            console.error("Error al iniciar:", error);
            ocultarLoader();
            statusText.innerText = "Error al conectar con el servidor. Intenta de nuevo.";
            recordBtn.innerText = "🎤 Iniciar Entrevista";
            recordBtn.disabled = false;
        }
    }

    async function enviarAN8n(audioBlob) {
        const formData = new FormData();
        formData.append("data", audioBlob, "grabacion.webm");
        formData.append("historial", JSON.stringify(historial));

        try {
            const response = await fetch(N8N_WEBHOOK_URL, { method: "POST", body: formData });
            const blob = await response.blob();
            reproducirAudio(blob, () => {
                recordBtn.innerText = "🎤 Hablar de nuevo";
                recordBtn.disabled = false;
                statusText.innerText = "Tu turno de responder.";
            });
        } catch (error) {
            console.error("Error:", error);
            ocultarLoader();
            statusText.innerText = "Hubo un error de conexión con el servidor.";
            recordBtn.innerText = "🎤 Intentar de nuevo";
            recordBtn.disabled = false;
        }
    }

    function reproducirAudio(blob, onFinished) {
        const audioURL = URL.createObjectURL(blob);
        const audio = new Audio(audioURL);
        audio.oncanplay = () => {
            ocultarLoader();
            statusText.innerText = "La reclutadora está hablando...";
            audio.play();
        };
        audio.onended = () => {
            URL.revokeObjectURL(audioURL);
            onFinished();
        };
        audio.load();
    }
</script>
</body>
</html>
