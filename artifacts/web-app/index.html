<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrevista AMPM</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; }
        button { background-color: #d32f2f; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%;}
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-style: italic; color: #555; font-size: 14px;}
    </style>
</head>
<body>

<div class="container">
    <h2>AMPM Nicaragua</h2>
    <h3>Entrevista Virtual IA</h3>
    <p>Presiona el botón para comenzar a hablar con tu entrevistador.</p>
    
    <button id="recordBtn">🎤 Iniciar Entrevista</button>
    <p id="status">Esperando...</p>
</div>

<script>
    // --- PEGA LA URL DE TU WEBHOOK DE N8N JUSTO ABAJO, ENTRE LAS COMILLAS ---
    const N8N_WEBHOOK_URL = "https://genaroroustan1.app.n8n.cloud/webhook-test/entrevista-ampm"; 
    
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let historial = [];

    const recordBtn = document.getElementById("recordBtn");
    const statusText = document.getElementById("status");

    recordBtn.addEventListener("click", async () => {
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                audioChunks = [];
                enviarAN8n(audioBlob);
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.innerText = "⏹️ Detener y Enviar";
            statusText.innerText = "Grabando... (Habla ahora y presiona detener cuando termines)";
        } else {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.innerText = "⏳ Pensando...";
            recordBtn.disabled = true;
            statusText.innerText = "Enviando respuesta a la IA, por favor espera...";
        }
    });

    async function enviarAN8n(audioBlob) {
        const formData = new FormData();
        formData.append("data", audioBlob, "grabacion.webm");
        formData.append("historial", JSON.stringify(historial));

        try {
            const response = await fetch(N8N_WEBHOOK_URL, { method: "POST", body: formData });
            const result = await response.json();
            
            historial.push({ rol: "ia", texto: result.texto });

            const audio = new Audio("data:audio/mp3;base64," + result.audio_base64);
            audio.play();

            statusText.innerText = "La IA está hablando...";
            
            audio.onended = () => {
                if (result.is_finished) {
                    statusText.innerText = "¡Entrevista finalizada! Muchas gracias.";
                    recordBtn.style.display = "none";
                } else {
                    recordBtn.innerText = "🎤 Hablar de nuevo";
                    recordBtn.disabled = false;
                    statusText.innerText = "Tu turno de responder.";
                }
            };
        } catch (error) {
            console.error("Error:", error);
            statusText.innerText = "Hubo un error de conexión con el servidor.";
            recordBtn.innerText = "🎤 Intentar de nuevo";
            recordBtn.disabled = false;
        }
    }
</script>
</body>
</html>
