<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrevista AMPM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 { color: #d32f2f; margin-bottom: 2px; }
        h3 { color: #555; font-weight: normal; margin-top: 0; margin-bottom: 16px; }
        p.intro { color: #666; font-size: 14px; margin-bottom: 4px; }

        /* ── Avatar ── */
        #avatar-wrapper {
            margin: 18px auto 20px;
            width: 160px;
            height: 160px;
            position: relative;
        }

        #avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(180deg, #e8e8e8 0%, #d0d0d0 100%);
            border: 2px solid rgba(211,47,47,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0px 0px rgba(211, 47, 47, 0.35);
            transform: scale(1) rotate(0deg);
            transition: transform 0.06s ease-out, box-shadow 0.06s ease-out;
            cursor: default;
            overflow: hidden;
            position: relative;
        }

        /* Blink overlay */
        #avatar::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0);
            transition: background 0.06s ease-in;
            pointer-events: none;
            z-index: 2;
        }
        #avatar.blink::before {
            background: rgba(0,0,0,0.07);
        }

/* Avatar "pensando" — respiración suave */
        @keyframes breathing {
            0%, 100% { transform: scale(1); box-shadow: 0 0 4px 1px rgba(211,47,47,0.08); }
            50%      { transform: scale(1.02); box-shadow: 0 0 12px 4px rgba(211,47,47,0.15); }
        }

        #avatar-wrapper.pensando #avatar {
            animation: breathing 3s ease-in-out infinite;
        }

        /* ── Botón ── */
        button {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 17px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 18px;
            width: 100%;
        }

        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #status {
            margin-top: 14px;
            font-style: italic;
            color: #555;
            font-size: 14px;
            min-height: 20px;
        }

        /* ── Loader ── */
        #loader { display: none; margin-top: 20px; }
        #loader.visible { display: block; }

        #loader-text {
            font-size: 13px;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .progress-bar-track {
            background-color: #f0f0f0;
            border-radius: 99px;
            height: 7px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 40%;
            background-color: #d32f2f;
            border-radius: 99px;
            animation: slide 1.4s ease-in-out infinite;
        }

        @keyframes slide {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 4px solid #f0f0f0;
            border-top-color: #d32f2f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 10px auto 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Fin entrevista ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #fin-mensaje {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fff3f3;
            border-radius: 8px;
            border: 1px solid #ffcdd2;
            animation: fadeIn 0.5s ease-in;
        }

        #fin-mensaje p.fin-titulo {
            color: #d32f2f;
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 8px;
        }

        #fin-mensaje p.fin-texto {
            color: #555;
            font-size: 14px;
            margin: 0;
        }

        /* ── Registro ── */
        #registro-screen {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: left;
        }

        #registro-screen .reg-header {
            text-align: center;
            margin-bottom: 20px;
        }

        #registro-screen .reg-header .reg-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 4px;
        }

        #registro-screen label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
            margin-top: 16px;
        }

        #registro-screen input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        #registro-screen input[type="text"]:focus {
            border-color: #d32f2f;
        }

        #registro-screen select {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
            background: white;
            cursor: pointer;
        }

        #registro-screen select:focus {
            border-color: #d32f2f;
        }

        .btn-toggle-group {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .btn-toggle {
            flex: 1;
            padding: 12px 8px;
            font-size: 14px;
            border: 2px solid #d32f2f;
            border-radius: 6px;
            background: white;
            color: #d32f2f;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s, color 0.2s;
            width: auto;
            margin-top: 0;
        }

        .btn-toggle.selected {
            background: #d32f2f;
            color: white;
        }

        .chip-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .chip {
            padding: 8px 16px;
            font-size: 13px;
            border: 2px solid #d32f2f;
            border-radius: 20px;
            background: white;
            color: #d32f2f;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            width: auto;
            margin-top: 0;
        }

        .chip.selected {
            background: #d32f2f;
            color: white;
        }

        #campos-anteriores {
            display: none;
            margin-top: 8px;
        }

        #campos-anteriores.visible {
            display: block;
        }

        #btn-comenzar {
            margin-top: 24px;
        }
    </style>
</head>
<body>

<!-- ── Pantalla de Registro ── -->
<div id="registro-screen">
    <div class="reg-header">
        <span class="reg-emoji">🏪</span>
        <h2>Proceso de Selección</h2>
        <h3>AMPM Nicaragua</h3>
    </div>

    <label for="reg-nombre">Nombre completo *</label>
    <input type="text" id="reg-nombre" placeholder="Ej: María González López">

    <label>¿Es tu primera vez aplicando en AMPM?</label>
    <div class="btn-toggle-group">
        <button type="button" class="btn-toggle" data-value="si" onclick="seleccionarPrimeraVez(true)">✓ Sí, primera vez</button>
        <button type="button" class="btn-toggle" data-value="no" onclick="seleccionarPrimeraVez(false)">↩ Ya apliqué antes</button>
    </div>

    <div id="campos-anteriores">
        <label>¿A qué cargo aplicaste?</label>
        <div class="chip-group" id="chips-cargo">
            <button type="button" class="chip" onclick="seleccionarChip(this, 'cargo')">Agente SAC</button>
            <button type="button" class="chip" onclick="seleccionarChip(this, 'cargo')">Gerente de tienda</button>
            <button type="button" class="chip" onclick="seleccionarChip(this, 'cargo')">Operativo</button>
            <button type="button" class="chip" onclick="seleccionarChip(this, 'cargo')">Oficina AMPM</button>
        </div>

        <label for="reg-anio">¿En qué año?</label>
        <select id="reg-anio" onchange="anioAnterior = this.value; validarRegistro();">
            <option value="">Selecciona...</option>
            <option>2019</option>
            <option>2020</option>
            <option>2021</option>
            <option>2022</option>
            <option>2023</option>
            <option>2024</option>
            <option>2025</option>
        </select>

        <label>¿Hasta qué etapa llegaste?</label>
        <div class="chip-group" id="chips-etapa">
            <button type="button" class="chip" onclick="seleccionarChip(this, 'etapa')">Prueba de integridad</button>
            <button type="button" class="chip" onclick="seleccionarChip(this, 'etapa')">Prueba matemática</button>
            <button type="button" class="chip" onclick="seleccionarChip(this, 'etapa')">Entrevista</button>
            <button type="button" class="chip" onclick="seleccionarChip(this, 'etapa')">Capacitación</button>
        </div>
    </div>

    <button id="btn-comenzar" disabled onclick="comenzarEntrevista()">Comenzar Entrevista →</button>
</div>

<!-- ── Pantalla de Entrevista ── -->
<div class="container" id="entrevista-screen" style="display:none;">
    <h2>AMPM Nicaragua</h2>
    <h3>Entrevista Virtual IA</h3>

    <!-- Avatar reactivo -->
    <div id="avatar-wrapper">
        <div id="avatar">
          <img src="avatar.png" style="width:100%; height:100%; object-fit:cover; object-position:center top; border-radius:50%;">
        </div>
    </div>

    <!-- Contador de preguntas -->
    <p id="question-counter" style="color:#aaa; font-size:13px; margin: -10px 0 12px;"></p>

    <p class="intro">Presiona el botón para comenzar a hablar con tu entrevistador.</p>

    <button id="recordBtn">🎤 Iniciar Entrevista</button>
    <p id="status">Esperando...</p>

    <div id="loader">
        <p id="loader-text">La reclutadora está procesando tu respuesta...</p>
        <div class="progress-bar-track">
            <div class="progress-bar-fill"></div>
        </div>
        <div class="spinner"></div>
    </div>

    <!-- Pantalla de fin de entrevista -->
    <div id="fin-mensaje">
        <p class="fin-titulo">✅ Entrevista Completada</p>
        <p class="fin-texto">Gracias, hemos terminado tu entrevista. Pronto recibirás noticias.</p>
    </div>
</div>

<script>
    const N8N_WEBHOOK_URL = "https://genaroroustan1.app.n8n.cloud/webhook/entrevista-ampm-v2";
    const TIMEOUT_MS      = 30000;
    const MAX_QUESTIONS   = 29;

    // ── Sesión única ────────────────────────────────────────────
    const sessionId = crypto.randomUUID();

    // ── Registro ────────────────────────────────────────────────
    let candidatoNombre  = "";
    let primeraVez       = null;   // true | false | null
    let cargoAnterior    = null;
    let anioAnterior     = null;
    let etapaAnterior    = null;

    const regNombre      = document.getElementById("reg-nombre");
    const camposAnteriores = document.getElementById("campos-anteriores");
    const btnComenzar    = document.getElementById("btn-comenzar");

    regNombre.addEventListener("input", () => {
        candidatoNombre = regNombre.value.trim();
        validarRegistro();
    });

    function seleccionarPrimeraVez(esPrimera) {
        primeraVez = esPrimera;
        const btns = document.querySelectorAll(".btn-toggle-group .btn-toggle");
        btns.forEach(b => b.classList.remove("selected"));
        if (esPrimera) {
            btns[0].classList.add("selected");
            camposAnteriores.classList.remove("visible");
            cargoAnterior = null;
            anioAnterior  = null;
            etapaAnterior = null;
        } else {
            btns[1].classList.add("selected");
            camposAnteriores.classList.add("visible");
        }
        validarRegistro();
    }

    function seleccionarChip(el, tipo) {
        const group = el.parentElement;
        group.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
        el.classList.add("selected");
        if (tipo === "cargo") cargoAnterior = el.innerText;
        if (tipo === "etapa") etapaAnterior = el.innerText;
        validarRegistro();
    }

    function validarRegistro() {
        let valido = candidatoNombre.length > 0 && primeraVez !== null;
        if (primeraVez === false) {
            valido = valido && cargoAnterior && etapaAnterior;
        }
        btnComenzar.disabled = !valido;
    }

    async function comenzarEntrevista() {
        desbloquearAudio();
        try { if (audioCtx) await audioCtx.resume(); } catch(e) {}
        document.getElementById("registro-screen").style.display  = "none";
        document.getElementById("entrevista-screen").style.display = "block";
        iniciarParpadeo();
    }

    function datosRegistro() {
        return {
            nombre:         candidatoNombre,
            primera_vez:    primeraVez,
            cargo_anterior: cargoAnterior || null,
            anio_anterior:  anioAnterior  || null,
            etapa_anterior: etapaAnterior || null
        };
    }

    // ── Estado ──────────────────────────────────────────────────
    let mediaRecorder;
    let audioChunks          = [];
    let isRecording          = false;
    let entrevistaIniciada   = false;
    let entrevistaFinalizada = false;
    let finalizando          = false;
    let conversationHistory  = [];
    let questionCount        = 0;

    // ── AudioContext global (instancia única reutilizada) ────────
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    // En móviles: NO crear AudioContext para evitar que robe la salida de audio
    const audioCtx = (!isMobile && AudioContextClass) ? new AudioContextClass() : null;

    // ── Audio element global (reutilizado para evitar bloqueo de autoplay) ──
    // iOS/Android bloquean audio.play() si el elemento no fue "desbloqueado"
    // por un user gesture. Crear UNO SOLO y reutilizarlo.
    const globalAudio = new Audio();
    globalAudio.setAttribute('playsinline', '');
    globalAudio.setAttribute('webkit-playsinline', '');
    globalAudio.preload = 'auto';
    let globalAudioUnlocked = false;

    // Desbloquear el audio element durante un user gesture (click/tap)
    function desbloquearAudio() {
        if (globalAudioUnlocked) return;
        // Play + pause inmediato para "activar" el elemento en iOS
        const p = globalAudio.play();
        if (p) p.then(() => { globalAudio.pause(); globalAudio.currentTime = 0; }).catch(() => {});
        globalAudioUnlocked = true;
    }

    // ── DOM ──────────────────────────────────────────────────────
    const recordBtn      = document.getElementById("recordBtn");
    const statusText     = document.getElementById("status");
    const loader         = document.getElementById("loader");
    const avatar         = document.getElementById("avatar");
    const avatarWrapper  = document.getElementById("avatar-wrapper");
    const questionCounter = document.getElementById("question-counter");
    const finMensaje     = document.getElementById("fin-mensaje");

    // ── Frases rotativas durante espera ─────────────────────────
    const FRASES_PENSANDO = [
        "La reclutadora está procesando tu respuesta...",
        "Analizando tu respuesta...",
        "Preparando la siguiente pregunta...",
        "Un momento, estoy pensando..."
    ];
    let fraseInterval = null;

    // ── Loader ───────────────────────────────────────────────────
    function mostrarLoader(texto) {
        const loaderText = document.getElementById("loader-text");
        loaderText.innerText = texto || FRASES_PENSANDO[0];
        loader.classList.add("visible");

        clearInterval(fraseInterval);
        if (!texto) {
            let i = 1;
            fraseInterval = setInterval(() => {
                loaderText.innerText = FRASES_PENSANDO[i % FRASES_PENSANDO.length];
                i++;
            }, 2500);
        }
    }

    function ocultarLoader() {
        clearInterval(fraseInterval);
        fraseInterval = null;
        loader.classList.remove("visible");
        avatarWrapper.classList.remove("pensando");
    }

    // ── Contador de preguntas ────────────────────────────────────
    function actualizarContador() {
        questionCounter.innerText = questionCount > 0
            ? `Pregunta ${questionCount} de ${MAX_QUESTIONS}`
            : "";
    }

    // ── Fetch con timeout ────────────────────────────────────────
    async function fetchConTimeout(url, options) {
        const controller = new AbortController();
        const timeoutId  = setTimeout(() => controller.abort(), TIMEOUT_MS);
        try {
            return await fetch(url, { ...options, signal: controller.signal });
        } finally {
            clearTimeout(timeoutId);
        }
    }

    // ── Avatar / Animación hablando (time-based, funciona en desktop y móvil) ──
    let animFrameId = null;

    function iniciarAnimacionAvatar() {
        if (animFrameId) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
        }
        avatarWrapper.classList.add("hablando");
        detenerParpadeo();
        animarFrame();
    }

    function animarFrame() {
        animFrameId = requestAnimationFrame(animarFrame);
        const now = Date.now();

        // Scale oscila 1.02–1.06 basado en tiempo
        const scale  = 1.04 + Math.sin(now / 200) * 0.02;
        // Rotación sutil -1.5° a 1.5°
        const rotate = Math.sin(now / 300) * 1.5;

        avatar.style.transform = `scale(${scale.toFixed(4)}) rotate(${rotate.toFixed(2)}deg)`;
        avatar.style.boxShadow = `0 0 8px 3px rgba(211,47,47,0.35)`;
    }

    function detenerAnimacionAvatar() {
        if (animFrameId) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
        }
        avatarWrapper.classList.remove("hablando");
        avatar.style.transform = "scale(1) rotate(0deg)";
        avatar.style.boxShadow = "0 0 0px 0px rgba(211,47,47,0.35)";
        iniciarParpadeo();
    }

    // ── Parpadeo idle ────────────────────────────────────────────
    let blinkTimeout = null;

    function programarParpadeo() {
        const delay = 4000 + Math.random() * 2000; // 4–6 s
        blinkTimeout = setTimeout(() => {
            if (avatarWrapper.classList.contains("hablando") ||
                avatarWrapper.classList.contains("pensando")) {
                programarParpadeo();
                return;
            }
            avatar.classList.add("blink");
            setTimeout(() => {
                avatar.classList.remove("blink");
                programarParpadeo();
            }, 150);
        }, delay);
    }

    function iniciarParpadeo() {
        detenerParpadeo();
        programarParpadeo();
    }

    function detenerParpadeo() {
        if (blinkTimeout) { clearTimeout(blinkTimeout); blinkTimeout = null; }
        avatar.classList.remove("blink");
    }

    // ── Reproducción de audio ────────────────────────────────────
    // Reutiliza globalAudio (ya desbloqueado por user gesture) para
    // que iOS/Android no bloqueen audio.play() por falta de activación.
    let audioSourceNode = null;  // createMediaElementSource solo se puede llamar 1 vez por elemento

    function reproducirAudio(blob, onFinished) {
        const audioURL = URL.createObjectURL(blob);
        const audio    = globalAudio;
        let   finished = false;

        function safeFinish() {
            if (finished) return;
            finished = true;
            clearTimeout(safetyTimeout);
            detenerAnimacionAvatar();
            audio.onended = null;
            audio.onerror = null;
            audio.oncanplaythrough = null;
            URL.revokeObjectURL(audioURL);
            onFinished();
        }

        const safetyTimeout = setTimeout(() => {
            if (!finished) safeFinish();
        }, 60000);

        audio.onended = () => safeFinish();
        audio.onerror = () => {
            ocultarLoader();
            statusText.innerText = "Error al reproducir el audio. Intenta de nuevo.";
            safeFinish();
        };

        function intentarPlay() {
            ocultarLoader();
            avatarWrapper.classList.remove("pensando");
            statusText.innerText = "La reclutadora está hablando...";

            // Desktop con AudioContext: enrutar audio por el contexto
            if (audioCtx) {
                try {
                    audioCtx.resume();
                    if (!audioSourceNode) {
                        audioSourceNode = audioCtx.createMediaElementSource(audio);
                        audioSourceNode.connect(audioCtx.destination);
                    }
                } catch (_) {}
            }

            // Iniciar animación (time-based, funciona siempre)
            iniciarAnimacionAvatar();

            audio.play().catch(() => safeFinish());
        }

        // Asignar src — NO crear new Audio(), reusar el desbloqueado
        audio.src = audioURL;

        // canplaythrough es más confiable que canplay en iOS
        let played = false;
        audio.oncanplaythrough = () => {
            if (played) return;
            played = true;
            intentarPlay();
        };

        // Fallback: si canplaythrough no dispara en 5s, intentar igual
        setTimeout(() => {
            if (!played && !finished) {
                played = true;
                intentarPlay();
            }
        }, 5000);

        // Si ya está listo (readyState >= 3), disparar inmediato
        if (audio.readyState >= 3) {
            played = true;
            intentarPlay();
        }
    }

    // ── Pantalla de fin ──────────────────────────────────────────
    async function finalizarEntrevista() {
        if (finalizando) return;
        finalizando          = true;
        entrevistaFinalizada = true;
        recordBtn.disabled   = true;
        mostrarLoader("Finalizando entrevista...");

        try {
            const response = await fetchConTimeout(N8N_WEBHOOK_URL, {
                method:  "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    event:   "finalizar",
                    sessionId,
                    historial: conversationHistory,
                    ...datosRegistro()
                })
            });

            ocultarLoader();
            mostrarPantallaFin();
        } catch (_) {
            ocultarLoader();
            mostrarPantallaFin();
        }
    }

    function mostrarPantallaFin() {
        recordBtn.style.display  = "none";
        statusText.innerText     = "";
        questionCounter.innerText = "";
        finMensaje.style.display = "block";
    }

    // ── Botón principal ──────────────────────────────────────────
    recordBtn.addEventListener("click", async () => {
        if (entrevistaFinalizada) return;
        desbloquearAudio();

        // Primer clic: iniciar entrevista
        if (!entrevistaIniciada) {
            try { if (audioCtx) await audioCtx.resume(); } catch(e) {}
            recordBtn.disabled   = true;
            recordBtn.innerText  = "⏳ Conectando...";
            statusText.innerText = "Iniciando entrevista, por favor espera...";
            mostrarLoader("Conectando con la reclutadora...");
            await iniciarEntrevista();
            return;
        }

        // Iniciar grabación
        if (!isRecording) {
            if (audioCtx && audioCtx.state === "suspended") await audioCtx.resume();

            const stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    channelCount:     1,
                    echoCancellation: true,
                    noiseSuppression: true
                }
            });

            const mimeType = MediaRecorder.isTypeSupported('audio/webm; codecs=opus') ? 'audio/webm; codecs=opus' :
                             MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' :
                             MediaRecorder.isTypeSupported('audio/mp4; codecs=mp4a.40.2') ? 'audio/mp4; codecs=mp4a.40.2' :
                             MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' :
                             MediaRecorder.isTypeSupported('audio/aac') ? 'audio/aac' :
                             '';

            const recorderOptions = { audioBitsPerSecond: 32000 };
            if (mimeType) recorderOptions.mimeType = mimeType;
            mediaRecorder = new MediaRecorder(stream, recorderOptions);

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

            mediaRecorder.onstop = async () => {
                stream.getTracks().forEach(t => t.stop());
                const audioBlob = new Blob(audioChunks, { type: mimeType });
                audioChunks = [];
                // Registrar turno del usuario en historial
                conversationHistory.push({ role: "user", content: "", audioTimestamp: Date.now() });
                enviarAN8n(audioBlob);
            };

            mediaRecorder.start();
            isRecording          = true;
            recordBtn.innerText  = "⏹️ Detener y Enviar";
            statusText.innerText = "Grabando... (Habla ahora y presiona detener cuando termines)";

        // Detener grabación
        } else {
            mediaRecorder.stop();
            isRecording          = false;
            recordBtn.innerText  = "⏳ Pensando...";
            recordBtn.disabled   = true;
            statusText.innerText = "";
            avatarWrapper.classList.add("pensando");
            detenerParpadeo();
            mostrarLoader();
        }
    });

    // ── Llamadas al webhook ──────────────────────────────────────
    async function iniciarEntrevista() {
        try {
            if (audioCtx) await audioCtx.resume();
            const response = await fetchConTimeout(N8N_WEBHOOK_URL, {
                method:  "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ event: "start", sessionId, ...datosRegistro() })
            });

            if (!response.ok) throw new Error('HTTP ' + response.status);
            const blob = await response.blob();

            reproducirAudio(blob, () => {
                entrevistaIniciada = true;
                questionCount      = 1;
                actualizarContador();
                conversationHistory.push({ role: "assistant", content: "[bienvenida]" });
                recordBtn.innerText  = "🎤 Hablar";
                recordBtn.disabled   = false;
                statusText.innerText = "Tu turno de responder.";
            });

        } catch (error) {
            ocultarLoader();
            statusText.innerText = error.name === "AbortError"
                ? "Hubo un problema de conexión, intenta de nuevo."
                : "Error al conectar con el servidor. Intenta de nuevo.";
            recordBtn.innerText = "🎤 Iniciar Entrevista";
            recordBtn.disabled  = false;
        }
    }

    async function enviarAN8n(audioBlob) {
        const formData = new FormData();
        formData.append("data",      audioBlob, "grabacion.webm");
        formData.append("historial", JSON.stringify(conversationHistory));
        formData.append("sessionId", sessionId);

        try {
            const response = await fetchConTimeout(N8N_WEBHOOK_URL, {
                method: "POST",
                body:   formData
            });

            if (!response.ok) throw new Error('HTTP ' + response.status);
            const blob = await response.blob();

            const isRetry = (response.headers.get('X-Is-Retry') ?? '').replace(/^=/, '').trim() === 'true';

            if (isRetry) {
                // Limpiar entrada de usuario huérfana — n8n pidió repetir
                if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length - 1].role === 'user') {
                    conversationHistory.pop();
                }
            } else {
                const transcript = (response.headers.get('X-Transcript') ?? '').replace(/^=/, '').trim();
                if (transcript && conversationHistory.length > 0) {
                    const lastUserEntry = conversationHistory.filter(h => h.role === 'user').pop();
                    if (lastUserEntry) lastUserEntry.content = transcript;
                }
                questionCount++;
                actualizarContador();
                conversationHistory.push({ role: "assistant", content: `[respuesta_${questionCount}]` });
            }

            if (!isRetry && questionCount >= MAX_QUESTIONS) {
                reproducirAudio(blob, () => {
                    recordBtn.innerText  = "🎤 Responder última pregunta";
                    recordBtn.disabled   = false;
                    statusText.innerText = "Esta es tu última respuesta.";
                });
            } else {
                reproducirAudio(blob, () => {
                    recordBtn.innerText  = "🎤 Hablar de nuevo";
                    recordBtn.disabled   = false;
                    statusText.innerText = "Tu turno de responder.";
                });
            }

        } catch (error) {
            ocultarLoader();
            // Limpiar entrada huérfana del usuario si el envío falló
            if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length - 1].role === 'user') {
                conversationHistory.pop();
            }
            statusText.innerText = error.name === "AbortError"
                ? "Hubo un problema de conexión, intenta de nuevo."
                : "Hubo un error de conexión con el servidor.";
            recordBtn.innerText = "🎤 Intentar de nuevo";
            recordBtn.disabled  = false;
        }
    }
</script>
